name: Synergy Pairs Refresh

on:
  schedule:
    # 매일 19:00 UTC (= 04:00 KST) — 트래픽 적은 시간
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write frontend/.env from secrets
        run: |
          mkdir -p frontend
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          } > frontend/.env

      - name: Run synergy-pairs build
        run: node backend/scripts/fetch-and-build-trio-pair-synergy.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/manual_sql/trio_pair_synergy frontend/public/data/synergy-pairs
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: synergy-pairs 자동 갱신"
            git push origin main
          fi
