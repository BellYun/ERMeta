name: Perf CI (INP)

on:
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/next.config.ts"
      - "frontend/postcss.config.mjs"
      - "frontend/scripts/inp-benchmark.mjs"
      - "frontend/scripts/inp-ci.mjs"
      - ".github/workflows/perf-ci.yml"
  workflow_dispatch:

concurrency:
  group: perf-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inp-bench:
    name: INP Bench Gate (synergy-detail)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --yes playwright install --with-deps chromium

      - name: Build
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 -t 60000

      - name: Run INP gate
        env:
          BENCH_URL: http://localhost:3000/synergy-detail
          INP_THRESHOLD_MS: 250
          RUNS: 5
          CPU_THROTTLE: 6
        run: node scripts/inp-ci.mjs

      - name: Upload INP result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inp-ci-result
          path: frontend/inp-ci-result.json
          retention-days: 14
